<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Patch特訓</title>

<style>
body { margin:0; font-family:sans-serif; }

.container {
  display: flex;
  height: 100vh;
}

/* 左サイド */
.sidebar {
  width: 260px;
  border-right: 1px solid #ddd;
  padding: 10px;
}

/* メイン */
.main {
  flex:1;
  padding: 16px;
}

/* 問題 */
.question-box {
  border:1px solid #ddd;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

/* 横2カラム */
.content {
  display:flex;
  gap:16px;
}

/* 左（入力） */
.left-panel {
  flex:1;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* 右（結果） */
.right-panel {
  width:320px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* 共通BOX */
.box {
  border:1px solid #ddd;
  border-radius:8px;
  padding:10px;
}

/* 解答欄（小さく） */
textarea {
  width:100%;
  height:80px;
  font-size:14px;
}

/* ボタン */
.buttons {
  display:flex;
  flex-direction:column;
  gap:8px;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* 色分け */
.btn-check { background:#4CAF50; color:#fff; }
.btn-check.wrong { background:#f44336; }
.btn-next { background:#2196F3; color:#fff; }

h2 { margin:0; }
</style>
</head>

<body>

<div class="container">

  <!-- 左サイド -->
  <div class="sidebar">
    <div id="status"></div>
  </div>

  <!-- メイン -->
  <div class="main">

    <h1>Patch特訓</h1>

    <div class="question-box" id="question"></div>

    <div class="content">

      <!-- 左：入力 -->
      <div class="left-panel">

        <div class="box">
          <b>回答（Power Fx）</b>
          <textarea id="answer"></textarea>
        </div>

        <div class="box">
          <b>書く場所</b>
          <select id="place">
            <option value="">選択してください</option>
            <option value="OnSelect">OnSelect</option>
            <option value="OnVisible">OnVisible</option>
            <option value="Set">Set</option>
            <option value="UpdateContext">UpdateContext</option>
            <option value="Text">Text</option>
            <option value="Items">Items</option>
            <option value="Visible">Visible</option>
          </select>
        </div>

        <div class="buttons">
          <button class="btn-check" id="btnCheck" onclick="check()">判定</button>
          <button class="btn-next" onclick="next()">次へ</button>
        </div>

      </div>

      <!-- 右：結果 -->
      <div class="right-panel">

        <div class="box">
          <h2 id="result"></h2>
        </div>

        <div class="box">
          <b>正解</b>
          <pre id="correct"></pre>
        </div>

        <div class="box">
          <b>解説</b>
          <div id="explain"></div>
        </div>

      </div>

    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
