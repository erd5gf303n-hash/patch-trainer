<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Patch特訓</title>

<style>
:root { --border:#ddd; --bg:#fafafa; }

body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
}

.container { display:flex; min-height:100vh; }

/* ===== 左サイド ===== */
.sidebar {
  width:320px;
  border-right:1px solid var(--border);
  background:var(--bg);
  padding:16px;
  box-sizing:border-box;
}

.card {
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
  background:#fff;
  margin-bottom:14px;
}

#status { line-height:1.7; font-weight:600; }

/* ===== メイン ===== */
.main {
  flex:1;
  padding:24px;
  box-sizing:border-box;
}

.main-inner { max-width:1000px; margin:0 auto; }

h1 { margin-top:0; }

.section-title {
  font-size:14px;
  font-weight:700;
  margin-bottom:6px;
  color:#555;
}

.box {
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
  background:#fff;
  margin-bottom:14px;
}

.two-col {
  display:flex;
  gap:16px;
  align-items:flex-start;
}

.col-left { flex:1; }
.col-right { width:360px; }

textarea {
  width:100%;
  height:90px;
  font-size:15px;
  padding:8px;
  border-radius:8px;
  border:1px solid var(--border);
  font-family:monospace;
  box-sizing:border-box;
}

select {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
  box-sizing:border-box;
}

.place-area {
  display:flex;
  gap:12px;
}

.place-buttons {
  display:flex;
  flex-direction:column;
  gap:10px;
  width:110px;
}

.place-buttons button {
  padding:10px;
  border:none;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
  font-size:14px;
}

.btn-check { background:#4CAF50; }
.btn-next { background:#2196F3; }

.btn-check.wrong { background:#f44336 !important; }

pre {
  white-space:pre-wrap;
  margin:0;
  font-family:monospace;
}
</style>
</head>

<body>

<div class="container">

<!-- ===== 左サイド ===== -->
<aside class="sidebar">

<div class="card">
<div class="section-title">進捗</div>
<div id="status">読み込み中…</div>
</div>

</aside>


<!-- ===== メイン ===== -->
<main class="main">
<div class="main-inner">

<h1>Patch特訓</h1>

<div class="two-col">

<div class="col-left">

<!-- 問題 -->
<div class="section-title">問題</div>
<div class="box">
<div id="question"></div>
</div>

<!-- 回答 -->
<div class="section-title">回答（Power Fx）</div>
<div class="box">
<textarea id="answer" placeholder="ここにPatch式を書いてください"></textarea>
</div>

<!-- 置く場所 -->
<div class="section-title">置く場所</div>
<div class="box place-area">

<div style="flex:1;">
<select id="place">
<option value="">選択してください</option>
<option value="OnSelect">OnSelect（ボタン押下時）</option>
<option value="OnVisible">OnVisible（画面表示時）</option>
<option value="Set">Set</option>
<option value="UpdateContext">UpdateContext</option>
<option value="Text">Text</option>
<option value="Items">Items</option>
<option value="Visible">Visible</option>
</select>
</div>

<div class="place-buttons">
<button id="btnCheck" class="btn-check" onclick="check()">判定</button>
<button class="btn-next" onclick="next()">次へ</button>
</div>

</div>

</div>


<!-- 右列 -->
<div class="col-right">

<div class="box">
<h2 id="result"></h2>
</div>

<div class="box">
<strong>正解</strong>
<pre id="correct"></pre>
</div>

<div class="box">
<strong>解説</strong>
<div id="explain"></div>
</div>

</div>

</div>
</div>
</main>

</div>

<script src="app.js"></script>
</body>
</html>
