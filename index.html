<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Patch特訓</title>

  <style>
    :root{
      --bg:#ffffff;
      --panel:#f7f7f8;
      --card:#ffffff;
      --border:#e5e7eb;
      --text:#0f172a;
      --muted:#64748b;

      --red:#ef4444;
      --blue:#3b82f6;
      --green:#16a34a;
      --amber:#f59e0b;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .app{
      display:flex;
      min-height:100vh;
    }

    /* 左サイド */
    .sidebar{
      width:320px;
      background:var(--panel);
      border-right:1px solid var(--border);
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
    }

    .card h3{
      margin:0 0 8px 0;
      font-size:13px;
      letter-spacing:.02em;
      color:#334155;
    }

    .stat{
      font-size:14px;
      line-height:1.9;
      font-weight:700;
    }

    .pill-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .pill{
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background:#fff;
      color:#334155;
      cursor:pointer;
      user-select:none;
    }
    .pill[aria-pressed="true"]{
      border-color:#94a3b8;
      box-shadow:0 0 0 2px rgba(148,163,184,.25) inset;
      font-weight:800;
    }

    .btn{
      font-size:13px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:#fff;
      cursor:pointer;
      font-weight:800;
    }
    .btn:active{ transform:translateY(1px); }

    .wrong-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height:46vh;
      overflow:auto;
      padding-right:2px;
    }

    .wrong-item{
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px;
      background:#fff;
    }
    .wrong-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:6px;
    }
    .badge{
      font-size:12px;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid var(--border);
      background:#fff;
      color:#334155;
      white-space:nowrap;
    }
    .badge.badge-red{
      border-color:#fecaca;
      background:#fff1f2;
      color:#991b1b;
      font-weight:900;
    }
    .wrong-text{
      font-size:12px;
      color:#334155;
      line-height:1.5;
    }

    /* メイン */
    .main{
      flex:1;
      padding:22px 22px 40px;
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
    }

    .title{
      font-size:32px;
      font-weight:900;
      margin:6px 0 16px;
    }

    /* 2カラム（左：入力 / 右：結果） */
    .grid{
      display:grid;
      grid-template-columns: 1fr 360px;
      gap:14px;
      align-items:start;
    }

    .box{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
    }

    .box h4{
      margin:0 0 8px;
      font-size:13px;
      color:#334155;
      letter-spacing:.02em;
    }

    #question{
      font-size:14px;
      font-weight:800;
      line-height:1.6;
      white-space:pre-wrap;
    }

    textarea{
      width:100%;
      height:90px;
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px 12px;
      font-size:18px;          /* 解答文字ちょい大きめ */
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Noto Sans Mono", monospace;
      resize:vertical;
      outline:none;
    }
    textarea:focus{
      box-shadow:0 0 0 3px rgba(59,130,246,.15);
      border-color:#93c5fd;
    }

    .place-row{
      display:flex;
      gap:12px;
      align-items:stretch;
    }

    select{
      width:100%;
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px 12px;
      font-size:14px;
      outline:none;
      background:#fff;
    }
    select:focus{
      box-shadow:0 0 0 3px rgba(59,130,246,.12);
      border-color:#93c5fd;
    }

    .actions{
      width:130px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .actions button{
      border:none;
      border-radius:12px;
      padding:12px 12px;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      color:#fff;
    }
    #btnCheck{ background:var(--red); }
    #btnNext{ background:var(--blue); }
    #btnCheck:active, #btnNext:active{ transform:translateY(1px); }

    /* 結果（右） */
    .result-title{
      font-size:28px;
      font-weight:1000;
      margin:0 0 10px;
    }
    .result-title.ok{ color:var(--green); }
    .result-title.ng{ color:var(--red); }

    .result-card{
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      background:#fff;
      margin-bottom:12px;
    }

    .result-card.ok{
      border-color:#bbf7d0;
      background:#f0fdf4;
    }
    .result-card.ng{
      border-color:#fecaca;
      background:#fff1f2;
    }

    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Noto Sans Mono", monospace;
      white-space:pre-wrap;
      font-size:13px;
      line-height:1.55;
    }

    .muted{ color:var(--muted); font-size:12px; }

    /* レスポンシブ */
    @media (max-width: 1060px){
      .grid{ grid-template-columns:1fr; }
    }
    @media (max-width: 820px){
      .sidebar{ display:none; }
      .main{ padding:16px; }
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- 左：進捗 -->
    <aside class="sidebar">
      <div class="card">
        <h3>進捗</h3>
        <div id="status" class="stat">読み込み中…</div>

        <div class="pill-row" style="margin-top:12px;">
          <span class="pill" id="modeAll" aria-pressed="true">全問題</span>
          <span class="pill" id="modeWeak" aria-pressed="false">苦手だけ</span>
        </div>

        <div style="display:flex; gap:10px; margin-top:12px;">
          <button class="btn" id="btnReset">統計リセット</button>
        </div>

        <div class="muted" style="margin-top:10px;">
          ※「苦手だけ」は、間違えた問題リストに入っているものが対象
        </div>
      </div>

      <div class="card">
        <h3>間違えた問題</h3>
        <div id="wrongList" class="wrong-list"></div>
      </div>
    </aside>

    <!-- 右：メイン -->
    <main class="main">
      <div class="wrap">
        <div class="title">Patch特訓</div>

        <div class="grid">
          <!-- 左：問題～入力 -->
          <div>
            <div class="box" style="margin-bottom:14px;">
              <h4>問題</h4>
              <div id="question"></div>
            </div>

            <div class="box" style="margin-bottom:14px;">
              <h4>回答（Power Fx）</h4>
              <textarea id="answer" placeholder="ここにPatch式を書いてください"></textarea>
            </div>

            <div class="box">
              <h4>置く場所（選択）</h4>

              <div class="place-row">
                <div style="flex:1;">
                  <select id="place">
                    <option value="">選択してください</option>
                    <option value="Text">Text</option>
                    <option value="Items">Items</option>
                    <option value="Visible">Visible</option>
                    <option value="Set">Set</option>
                    <option value="UpdateContext">UpdateContext</option>
                    <option value="OnSelect">OnSelect</option>
                    <option value="OnVisible">OnVisible</option>
                  </select>
                  <div class="muted" style="margin-top:8px;">
                    Patchは基本「イベント側（OnSelect / OnVisible）」に書くことが多い
                  </div>
                </div>

                <div class="actions">
                  <button id="btnCheck" type="button">判定</button>
                  <button id="btnNext" type="button">次へ</button>
                </div>
              </div>
            </div>
          </div>

          <!-- 右：結果 -->
          <div>
            <div id="resultArea" style="display:none;">
              <div id="resultTitle" class="result-title"></div>

              <div id="resultCard" class="result-card">
                <h4 style="margin:0 0 8px;">正解</h4>
                <div id="correct" class="mono"></div>
                <div id="placeCorrect" class="mono" style="margin-top:8px;"></div>
              </div>

              <div class="result-card">
                <h4 style="margin:0 0 8px;">解説</h4>
                <div id="explain" style="font-size:13px; line-height:1.6;"></div>
              </div>
            </div>

            <div class="muted" style="margin-top:10px;">
              ※判定すると、ここに正解・解説が表示されます
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
