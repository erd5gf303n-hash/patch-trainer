<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Patch特訓</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif; margin: 24px; }
    h1 { margin-bottom: 16px; }
    .box { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin: 12px 0; }
    textarea { width: 100%; height: 120px; }
    button { margin-right: 8px; padding: 8px 12px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .small { font-size: 12px; color: #666; margin-top: 6px; }
    .places { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 8px; margin-top: 8px; }
    .place-item { border: 1px solid #eee; border-radius: 8px; padding: 10px; background: #fafafa; }
    .place-item label { display: flex; gap: 8px; align-items: center; cursor: pointer; }
    .place-desc { font-size: 12px; color: #666; margin-left: 26px; margin-top: 4px; }
    pre { white-space: pre-wrap; margin: 0; }
  </style>
</head>
<body>

<h1>Patch特訓</h1>

<!-- 問題 -->
<div class="box">
  <div id="question" style="white-space:pre-wrap;"></div>
</div>

<!-- 解答 -->
<div class="box">
  <strong>回答（Power Fx）</strong>
  <textarea id="answer" placeholder="ここにPatch式を書いてください"></textarea>

  <div class="small">
    Enterで判定 / Ctrl+Enterで次へ
  </div>
</div>

<!-- 置き場（複数選択OK） -->
<div class="box">
  <strong>書く場所（複数選択OK）</strong>

  <div class="places">
    <div class="place-item">
      <label><input type="checkbox" name="place" value="OnSelect"> OnSelect</label>
      <div class="place-desc">ボタンを押した時に実行（保存ボタンなど）</div>
    </div>

    <div class="place-item">
      <label><input type="checkbox" name="place" value="OnVisible"> OnVisible</label>
      <div class="place-desc">画面表示時に実行（初期化・初回ロード）</div>
    </div>

    <div class="place-item">
      <label><input type="checkbox" name="place" value="Set"> Set</label>
      <div class="place-desc">変数に値を入れる（例：Set(gblX, …)）</div>
    </div>

    <div class="place-item">
      <label><input type="checkbox" name="place" value="UpdateContext"> UpdateContext</label>
      <div class="place-desc">画面内変数に値を入れる（例：UpdateContext({x:…})）</div>
    </div>

    <div class="place-item">
      <label><input type="checkbox" name="place" value="Text"> Text</label>
      <div class="place-desc">ラベル等の表示用プロパティ</div>
    </div>

    <div class="place-item">
      <label><input type="checkbox" name="place" value="Items"> Items</label>
      <div class="place-desc">ギャラリー等のデータ元（Filter/Sortなど）</div>
    </div>

    <div class="place-item">
      <label><input type="checkbox" name="place" value="Visible"> Visible</label>
      <div class="place-desc">表示/非表示の条件式</div>
    </div>
  </div>

  <div class="small">
    ※問題によって「必須の場所」があります（例：保存ボタンなら基本 OnSelect）
  </div>
</div>

<!-- ボタン -->
<div class="row" style="margin: 12px 0;">
  <button onclick="check()">判定</button>
  <button onclick="reveal()">答えを見る</button>
  <button onclick="next()">次へ</button>
  <button onclick="shuffle()">シャッフルし直す</button>
</div>

<!-- 結果 -->
<h2 id="result"></h2>

<div class="box">
  <strong>正解</strong>
  <pre id="correct"></pre>
</div>

<div class="box">
  <strong>解説</strong>
  <div id="explain" style="white-space:pre-wrap;"></div>
</div>

<script src="app.js"></script>

</body>
</html>
