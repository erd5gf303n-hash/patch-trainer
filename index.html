<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>Patch特訓</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
}

/* 全体 */
.container {
  display: flex;
}

/* サイド */
.sidebar {
  width: 240px;
  border-right: 1px solid #ccc;
  padding: 10px;
}

/* メイン */
.main {
  flex: 1;
  padding: 16px;
}

/* 問題 */
.question-box {
  border: 1px solid #ccc;
  padding: 10px;
  margin-bottom: 10px;
}

/* 2カラム */
.content {
  display: flex;
  gap: 20px;
}

/* 左 */
.left {
  flex: 1;
}

/* 右 */
.right {
  width: 320px;
}

/* 共通BOX */
.box {
  border: 1px solid #ccc;
  padding: 10px;
  margin-bottom: 10px;
}

/* テキストエリア */
textarea {
  width: 100%;
  height: 80px;
  font-size: 14px;
}

/* ボタン */
.buttons {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.btn-check {
  background: #4CAF50;
  color: white;
}

.btn-next {
  background: #2196F3;
  color: white;
}
</style>
</head>

<body>

<div class="container">

  <!-- 左サイド -->
  <div class="sidebar">
    <div id="status"></div>
  </div>

  <!-- メイン -->
  <div class="main">

    <h1>Patch特訓</h1>

    <div class="question-box" id="question"></div>

    <div class="content">

      <!-- 左 -->
      <div class="left">

        <div class="box">
          <b>回答（Power Fx）</b><br>
          <textarea id="answer"></textarea>
        </div>

        <div class="box">
          <b>書く場所</b><br>
          <select id="place">
            <option value="">選択してください</option>
            <option value="OnSelect">OnSelect</option>
            <option value="OnVisible">OnVisible</option>
            <option value="Set">Set</option>
            <option value="UpdateContext">UpdateContext</option>
            <option value="Text">Text</option>
            <option value="Items">Items</option>
            <option value="Visible">Visible</option>
          </select>
        </div>

        <div class="buttons">
          <button class="btn-check" onclick="check()">判定</button>
          <button class="btn-next" onclick="next()">次へ</button>
        </div>

      </div>

      <!-- 右 -->
      <div class="right">

        <div class="box">
          <h2 id="result"></h2>
        </div>

        <div class="box">
          <b>正解</b>
          <pre id="correct"></pre>
        </div>

        <div class="box">
          <b>解説</b>
          <div id="explain"></div>
        </div>

      </div>

    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
